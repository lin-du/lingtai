name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Compute source tarball checksum
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          url="https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "source=$sha" >> "$GITHUB_OUTPUT"
          echo "Source tarball SHA256: $sha"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Lingtai-AI/homebrew-lingtai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.source }}
        run: |
          VERSION="${TAG#v}"
          cat > homebrew-tap/lingtai-tui.rb << FORMULA
          class LingtaiTui < Formula
            desc "Terminal UI for the Lingtai AI agent framework"
            homepage "https://github.com/Lingtai-AI/lingtai"
            version "${VERSION}"
            license "MIT"

            url "https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SHA}"

            depends_on "go" => :build
            depends_on "node" => :build
            depends_on "uv" => :recommended
            depends_on "python@3.13" => :recommended

            def install
              # Network mirror selection, in priority order:
              #   1. HOMEBREW_GOPROXY (explicit user override) — community convention,
              #      survives Homebrew's superenv scrub because of the HOMEBREW_ prefix.
              #   2. Auto-detect: probe a stable proxy.golang.org API endpoint with a
              #      3s timeout. If unreachable (typical on mainland China networks),
              #      fall back to CN-accessible mirrors for Go modules, the Go checksum
              #      database (sum.golang.google.cn is Google's own CN-reachable alias
              #      of sum.golang.org, required for CN builds to succeed), and npm.
              #   3. Otherwise: leave ENV untouched — users elsewhere see no difference.
              if ENV["HOMEBREW_GOPROXY"]
                ENV["GOPROXY"] = ENV["HOMEBREW_GOPROXY"]
              else
                proxy_reachable = quiet_system(
                  "curl", "-sSfL", "--max-time", "3", "-o", "/dev/null",
                  "https://proxy.golang.org/github.com/golang/go/@latest"
                )
                unless proxy_reachable
                  opoo "proxy.golang.org unreachable; using China-friendly build mirrors."
                  ENV["GOPROXY"]             = "https://goproxy.cn,direct"
                  ENV["GOSUMDB"]             = "sum.golang.google.cn"
                  ENV["NPM_CONFIG_REGISTRY"] = "https://registry.npmmirror.com"
                end
              end

              cd "tui" do
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-tui", "."
                # Create 'lingtai' alias for backward compatibility
                # Only if 'lingtai' doesn't exist or is already a symlink to lingtai-tui
                unless (bin/"lingtai").exist? && (!(bin/"lingtai").symlink? || (bin/"lingtai").readlink.to_s != "lingtai-tui")
                  bin.install_symlink "lingtai-tui" => "lingtai"
                end
              end

              cd "portal" do
                cd "web" do
                  system "npm", "ci"
                  system "npm", "run", "build"
                end
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-portal", "."
              end
            end

            test do
              assert_match "lingtai-tui", shell_output("#{bin}/lingtai-tui version 2>&1", 0)
              assert_match "lingtai-tui", shell_output("#{bin}/lingtai version 2>&1", 0)
            end
          end
          FORMULA

      - name: Push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lingtai-tui.rb
          git diff --cached --quiet || git commit -m "Update lingtai-tui to ${{ github.ref_name }}"
          git push
